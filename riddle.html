<!DOCTYPE html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
  <meta charset="UTF-8">
  <style>
    #hidden-content {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.35s ease;
      max-height: 0;
      opacity: 0;
    }
    #hidden-content.visible {
      max-height: 400px;
      opacity: 1;
    }
  </style>
</head>
<body>

  <p style="font-size:18px; font-family: Arial;">I can fly but I have no wings. I can cry but I have no eyes. Wherever I go, darkness follows me. What am I?</p>

  <button onclick="toggle()" style="font-size: 16px; font-family: Arial; font-weight: bold; color: black; background-color: #ffffff; border: outset; padding: 5px 10px; border-radius: 6px; cursor: pointer;">
  Show answer
  </button>

  <div id="hidden-content">
    <p style="font-size:18px; font-family: Arial;">A cloud!</p>
  </div>

  <script>
    function toggle() {
      const content = document.getElementById('hidden-content');
      const btn = document.querySelector('button');
      const isVisible = content.classList.toggle('visible');
      btn.textContent = isVisible ? 'Hide answer' : 'Show answer';
    }
  </script>

</body>
</html>
